name: Docker Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Verificar arquivos
        run: ls -la

      - name: Construir imagem Docker
        run: docker build -t meu-app:latest .
        working-directory: ./
